name: Update contribution heatmap

on:
  schedule:
    # Runs once a day at 00:15 UTC
    - cron: "15 0 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update-heatmap:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements-daily.txt

      - name: Fetch contribution data
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python3 scripts/fetch_contributions.py muhammadsaami assets/contributions.json

      - name: Render heatmap SVG
        run: python3 scripts/render_heatmap_svg.py assets/contributions.json assets/heatmap.svg

      - name: Commit updated heatmap
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/heatmap.svg assets/contributions.json
          git diff --quiet --cached || git commit -m "chore: refresh contribution heatmap"
          git push
